[general]
poll_seconds = 60
stable_seconds = 30
connect_timeout = 15
read_timeout = 30
passive_mode = true
log_level = INFO

[ftp_01]
enabled = true
display_name = Sunrise FTP
protocol = ftps
host = ftps.sunrise-office.net
port = 990
username = your_user
password = your_password
remote_dirs = /upload,/upload/layout,/upload/genga
recursive = false
include_extensions = zip,rar,7z,pdf,jpg,jpeg,png,tif,tiff,clip,psd,txt
exclude_extensions = tmp,part,crdownload
exclude_name_contains = .tmp,~$,uploading
encoding = utf-8

[ftp_02]
enabled = false
display_name = Backup FTP
protocol = ftp
host = ftp.example.com
port = 21
username = user2
password = pass2
remote_dirs = /incoming
recursive = true
include_extensions =
exclude_extensions = tmp,part
exclude_name_contains =
encoding = utf-8
