# Sample configuration (do not store production secrets in this file)
[general]
poll_seconds = 60
stable_seconds = 30
connect_timeout = 15
read_timeout = 30
passive_mode = true
log_level = INFO
mail_module_path = mail.py

[notification]
mode = windows

[mail]
enabled = false
provider = gmail
smtp_server = smtp.gmail.com
smtp_port = 587
use_tls = true
from_address = your_sender@gmail.com
to_address = your_receiver@example.com
subject = [FTPWATCH] updated
username = your_sender@gmail.com
password = DUMMY_PASSWORD

[startup]
notify_existing_on_start = false

[ftp_01]
enabled = true
display_name = Example FTPS
protocol = ftps-implicit
host = ftp.example.com
port = 990
username = your_username
password = CHANGEME
remote_dirs = /upload|/upload/layout
recursive = false
include_extensions = zip,rar,7z,pdf,jpg,jpeg,png,tif,tiff,clip,psd,txt
exclude_extensions = tmp,part,crdownload
exclude_name_contains = .tmp,~$,uploading
encoding = utf-8
