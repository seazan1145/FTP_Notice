# Sample configuration (do not store production secrets in this file)
[general]
poll_seconds = 60
stable_seconds = 30
connect_timeout = 15
read_timeout = 30
passive_mode = true
log_level = INFO
notification_mode = windows
mail_module_path = mail.py
mail_enabled = false
mail_smtp_server = smtp.gmail.com
mail_smtp_port = 587
mail_from_address = your_sender@gmail.com
mail_to_address = your_receiver@example.com
mail_subject = [FTPWATCH] updated
mail_use_tls = true
mail_username = your_sender@gmail.com
mail_password =

[ftp_01]
enabled = true
display_name = Example FTPS
protocol = ftps-implicit
host = ftp.example.com
port = 990
username = your_username
password = CHANGEME
remote_dirs = /upload,/upload/layout
recursive = false
include_extensions = zip,rar,7z,pdf,jpg,jpeg,png,tif,tiff,clip,psd,txt
exclude_extensions = tmp,part,crdownload
exclude_name_contains = .tmp,~$,uploading
encoding = utf-8
